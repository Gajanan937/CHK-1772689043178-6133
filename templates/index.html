<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Online Compliance & Document Workflow Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sidebar-bg: #0f172a;
    --sidebar-hover: #1e293b;
    --sidebar-active: #1d4ed8;
    --accent: #3b82f6;
    --accent-dark: #1d4ed8;
    --accent-light: #eff6ff;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --orange: #f97316;
    --purple: #8b5cf6;
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --sidebar-width: 260px;
    --header-height: 64px;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-width); min-height: 100vh; background: var(--sidebar-bg);
    display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100;
    transition: transform .3s ease;
  }
  .sidebar-logo {
    padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px; background: linear-gradient(135deg,#3b82f6,#1d4ed8);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-text { color: #fff; }
  .logo-text strong { display: block; font-size: 13px; font-weight: 700; line-height: 1.2; }
  .logo-text span { font-size: 10px; color: #94a3b8; font-weight: 400; }

  .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .nav-section-label {
    font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase;
    letter-spacing: .08em; padding: 12px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; cursor: pointer; color: #94a3b8; font-size: 13.5px;
    font-weight: 500; transition: all .2s; margin-bottom: 2px; position: relative;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: #e2e8f0; }
  .nav-item.active { background: rgba(59,130,246,.15); color: #60a5fa; }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60%; background: #3b82f6; border-radius: 0 3px 3px 0;
  }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; background: var(--danger); color: #fff; font-size: 10px;
    font-weight: 700; padding: 2px 6px; border-radius: 99px; min-width: 18px; text-align: center;
  }
  .nav-badge.blue { background: var(--accent); }

  .sidebar-footer {
    padding: 14px; border-top: 1px solid rgba(255,255,255,.07);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    background: rgba(255,255,255,.05); border-radius: 10px; cursor: pointer;
    transition: background .2s;
  }
  .user-card:hover { background: rgba(255,255,255,.09); }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-info strong { display: block; font-size: 12.5px; color: #e2e8f0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-info span { font-size: 11px; color: #64748b; }

  /* ── MAIN ── */
  #main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  #header {
    height: var(--header-height); background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 50;
  }
  .hamburger { display: none; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted); }
  .header-title { font-size: 17px; font-weight: 700; flex: 1; }
  .header-title span { font-size: 12px; font-weight: 400; color: var(--text-muted); display: block; }

  .role-switcher {
    display: flex; align-items: center; gap: 8px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer;
    font-size: 12.5px; font-weight: 500; color: var(--text); transition: all .2s;
  }
  .role-switcher:hover { border-color: var(--accent); }
  .role-dot { width: 8px; height: 8px; border-radius: 50%; }

  .notif-btn {
    position: relative; background: none; border: none; cursor: pointer;
    width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; color: var(--text-muted); transition: all .2s;
  }
  .notif-btn:hover { background: var(--bg); color: var(--text); }
  .notif-count {
    position: absolute; top: 4px; right: 4px; background: var(--danger); color: #fff;
    font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; border: 2px solid var(--card);
  }

  /* ── CONTENT ── */
  #content { flex: 1; padding: 24px; overflow-y: auto; }
  .page { display: none; animation: fadeIn .3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── PAGE HEADER ── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-size: 22px; font-weight: 800; }
  .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px;
    border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; transition: all .2s; text-decoration: none; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,.35); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-warning:hover { background: #d97706; }
  .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 8px; border-radius: 8px; }

  /* ── CARDS ── */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
  .card-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h3 { font-size: 15px; font-weight: 700; }
  .card-body { padding: 20px; }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 16px; transition: transform .2s, box-shadow .2s;
    position: relative; overflow: hidden;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.blue::before { background: var(--accent); }
  .stat-card.green::before { background: var(--success); }
  .stat-card.yellow::before { background: var(--warning); }
  .stat-card.red::before { background: var(--danger); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-icon {
    width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .stat-icon.blue { background: #eff6ff; }
  .stat-icon.green { background: #ecfdf5; }
  .stat-icon.yellow { background: #fffbeb; }
  .stat-icon.red { background: #fef2f2; }
  .stat-icon.purple { background: #f5f3ff; }
  .stat-info h2 { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-info p { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
  .stat-change { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .stat-change.up { color: var(--success); }
  .stat-change.down { color: var(--danger); }

  /* ── GRID LAYOUTS ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  @media(max-width:1100px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } }
  @media(max-width:700px) { .grid-3 { grid-template-columns: 1fr; } }

  /* ── WORKFLOW PIPELINE ── */
  .workflow-pipeline {
    display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 20px;
  }
  .wf-step {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-width: 110px; position: relative;
  }
  .wf-step:not(:last-child)::after {
    content: ''; position: absolute; top: 22px; left: calc(50% + 22px);
    width: calc(100% - 44px); height: 2px; background: var(--border);
  }
  .wf-step.done:not(:last-child)::after { background: var(--success); }
  .wf-step.active:not(:last-child)::after { background: linear-gradient(90deg, var(--accent), var(--border)); }
  .wf-circle {
    width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 18px; border: 2px solid var(--border);
    background: var(--card); transition: all .3s; position: relative; z-index: 1;
  }
  .wf-step.done .wf-circle { background: var(--success); border-color: var(--success); color: #fff; }
  .wf-step.active .wf-circle {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 0 0 6px rgba(59,130,246,.15);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 6px rgba(59,130,246,.15); } 50% { box-shadow: 0 0 0 10px rgba(59,130,246,.05); } }
  .wf-label { font-size: 11.5px; font-weight: 600; color: var(--text-muted); text-align: center; }
  .wf-step.done .wf-label { color: var(--success); }
  .wf-step.active .wf-label { color: var(--accent); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
    border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge-draft { background: #f1f5f9; color: #64748b; }
  .badge-draft::before { background: #94a3b8; }
  .badge-submitted { background: #eff6ff; color: #1d4ed8; }
  .badge-submitted::before { background: #3b82f6; }
  .badge-review { background: #fffbeb; color: #92400e; }
  .badge-review::before { background: #f59e0b; }
  .badge-approved { background: #ecfdf5; color: #065f46; }
  .badge-approved::before { background: #10b981; }
  .badge-rejected { background: #fef2f2; color: #991b1b; }
  .badge-rejected::before { background: #ef4444; }
  .badge-revision { background: #fff7ed; color: #9a3412; }
  .badge-revision::before { background: #f97316; }
  .badge-pending { background: #f5f3ff; color: #5b21b6; }
  .badge-pending::before { background: #8b5cf6; }

  .priority-badge { padding: 2px 8px; border-radius: 4px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .priority-low { background: #f1f5f9; color: #64748b; }
  .priority-medium { background: #eff6ff; color: #1d4ed8; }
  .priority-high { background: #fff7ed; color: #c2410c; }
  .priority-urgent { background: #fef2f2; color: #991b1b; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em;
    background: #f8fafc; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .15s; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: 12px 14px; vertical-align: middle; }
  tbody tr:last-child { border-bottom: none; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-box {
    display: flex; align-items: center; gap: 8px; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px;
    flex: 1; min-width: 200px; transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input { border: none; outline: none; font-size: 13px; background: transparent; width: 100%; font-family: inherit; }
  .filter-select {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px;
    font-size: 13px; background: var(--card); cursor: pointer; outline: none;
    font-family: inherit; color: var(--text); transition: border-color .2s;
  }
  .filter-select:focus { border-color: var(--accent); }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-grid.full { grid-template-columns: 1fr; }
  @media(max-width:640px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span2 { grid-column: span 2; }
  @media(max-width:640px) { .form-group.span2 { grid-column: span 1; } }
  .form-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .form-label .req { color: var(--danger); margin-left: 2px; }
  .form-input, .form-select, .form-textarea {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 13px;
    font-size: 13.5px; font-family: inherit; color: var(--text); background: var(--card);
    outline: none; transition: border-color .2s, box-shadow .2s; width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1);
  }
  .form-textarea { resize: vertical; min-height: 100px; }
  .form-hint { font-size: 11.5px; color: var(--text-muted); }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 10px; padding: 32px 20px;
    text-align: center; cursor: pointer; transition: all .2s; background: #fafbfc;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-zone p { font-size: 13.5px; color: var(--text-muted); }
  .upload-zone strong { color: var(--accent); }
  .upload-zone input[type=file] { display: none; }
  .uploaded-file {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; margin-top: 10px;
  }
  .uploaded-file .file-icon { font-size: 20px; }
  .uploaded-file .file-name { font-size: 13px; font-weight: 500; flex: 1; }
  .uploaded-file .file-size { font-size: 11px; color: var(--text-muted); }
  .uploaded-file .remove-file { cursor: pointer; color: var(--danger); font-size: 16px; }

  /* ── APPROVAL CARDS ── */
  .approval-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: box-shadow .2s; margin-bottom: 14px;
  }
  .approval-card:hover { box-shadow: var(--shadow-lg); }
  .approval-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .approval-card-title { font-size: 15px; font-weight: 700; }
  .approval-card-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .approval-card-meta span { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .approval-card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 14px; }
  .approval-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── TIMELINE ── */
  .timeline { padding: 4px 0; }
  .tl-item { display: flex; gap: 12px; padding-bottom: 18px; position: relative; }
  .tl-item:not(:last-child)::before {
    content: ''; position: absolute; left: 15px; top: 32px; bottom: 0;
    width: 2px; background: var(--border);
  }
  .tl-dot {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; flex-shrink: 0; border: 2px solid var(--border);
    background: var(--card);
  }
  .tl-dot.green { background: #ecfdf5; border-color: var(--success); }
  .tl-dot.blue { background: #eff6ff; border-color: var(--accent); }
  .tl-dot.yellow { background: #fffbeb; border-color: var(--warning); }
  .tl-dot.red { background: #fef2f2; border-color: var(--danger); }
  .tl-dot.gray { background: #f8fafc; border-color: var(--border); }
  .tl-content { flex: 1; }
  .tl-content strong { font-size: 13px; font-weight: 600; }
  .tl-content p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .tl-time { font-size: 11px; color: var(--text-light); margin-top: 3px; }

  /* ── NOTIFICATIONS ── */
  .notif-item {
    display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border);
    transition: background .15s; cursor: pointer;
  }
  .notif-item:hover { background: #f8fafc; }
  .notif-item.unread { background: #eff6ff; }
  .notif-item.unread:hover { background: #dbeafe; }
  .notif-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .notif-body { flex: 1; }
  .notif-body strong { font-size: 13px; font-weight: 600; }
  .notif-body p { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }
  .notif-time { font-size: 11px; color: var(--text-light); margin-top: 4px; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }

  /* ── AUDIT LOG ── */
  .action-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .action-submit { background: #eff6ff; color: #1d4ed8; }
  .action-approve { background: #ecfdf5; color: #065f46; }
  .action-reject { background: #fef2f2; color: #991b1b; }
  .action-review { background: #fffbeb; color: #92400e; }
  .action-upload { background: #f5f3ff; color: #5b21b6; }
  .action-login { background: #f0fdf4; color: #166534; }
  .action-revision { background: #fff7ed; color: #9a3412; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
